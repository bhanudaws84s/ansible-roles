- name: Install MySQL libraries
  ansible.builtin.pip:
    name: "{{ item }}"
    executable: pip3.9
  loop:
  - cryptography
  - PyMySQL
  
  
- name: Installing MYSQL server
  ansible.builtin.package:
    name: mysql-server
    state: present

- name: Start and enable MYSQL server
  ansible.builtin.service:
    name: mysqld
    state: started
    enabled: yes

- name: connect to mysql server
  community.mysql.mysql_info:
    login_user: root
    login_password: "{{ lookup('amazon.aws.aws_ssm', '/expense/mysqL/mysql_root_password', decrypt=True ) }}"
    login_host: mysql.deaws82s.online
  register: mysql_info
  ignore_errors: true

- name: print the mysql_info
  ansible.builtin.debug:
    msg: "{{ mysql_info }}"

- name: setting up root password
  ansible.builtin.command: mysql_secure_installation --set-root-pass "{{ lookup('amazon.aws.aws_ssm', '/expense/mysqL/mysql_root_password', decrypt=True ) }}"
  when: mysql_info.failed is true
